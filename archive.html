<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Archive | The Salty Vault Studio</title>
<style>
body { margin: 0; font-family: Georgia, serif; background: #161616; color: #f5f1e8; }
nav { background: #111; padding: 20px; text-align: center; }
nav a { color: #d8c7ae; text-decoration: none; margin: 0 15px; font-size: 0.95rem; }
nav a:hover { color: #d6a35d; }
header { padding: 80px 20px 50px; text-align: center; background: linear-gradient(to bottom, #111, #2f2a24); }
h1 { font-size: 4rem; margin-bottom: 10px; }
.subtitle { max-width: 820px; margin: auto; color: #d8c7ae; line-height: 1.8; }
.gallery { max-width: 1500px; margin: 60px auto; padding: 0 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 28px; align-items: start; }
.piece { background: #222; border-radius: 16px; overflow: hidden; border: 1px solid #333; }
.primary-image { width: 100%; height: 300px; object-fit: contain; display: block; background: #111; cursor: pointer; transition: transform 0.25s ease; }
.thumbnail-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 4px; background: #111; }
.thumbnail-strip img { width: 100%; height: 60px; object-fit: cover; display: block; background: #111; cursor: pointer; opacity: 0.85; transition: opacity 0.25s ease, transform 0.25s ease; }
.primary-image:hover, .thumbnail-strip img:hover { transform: scale(1.02); opacity: 1; }
.piece-info { padding: 22px; }
.piece-info h2 { margin-top: 0; font-size: 1.5rem; }
.status { color: #d6a35d; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; margin-bottom: 12px; }
.description { color: #d8c7ae; line-height: 1.7; font-size: 0.95rem; }
.lightbox { display: none; position: fixed; z-index: 9999; padding-top: 40px; left: 0; top: 0; width: 100%; height: 100vh; overflow: auto; background: rgba(0,0,0,0.92); }
.lightbox img { display: block; margin: auto; max-width: 92%; max-height: 88vh; border-radius: 12px; }
.lightbox-close { position: absolute; top: 18px; right: 34px; color: #fff; font-size: 42px; font-weight: bold; cursor: pointer; }
.lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); border: 1px solid #555; background: rgba(17,17,17,0.75); color: #f5f1e8; font-size: 42px; width: 56px; height: 72px; cursor: pointer; border-radius: 10px; }
.lightbox-prev { left: 24px; }
.lightbox-next { right: 24px; }
.lightbox-prev:hover, .lightbox-next:hover { color: #d6a35d; border-color: #d6a35d; }
footer { margin-top: 80px; padding: 40px; text-align: center; background: #111; color: #777; }
@media (max-width: 900px) { nav a { display: inline-block; margin: 6px 10px; } h1 { font-size: 2.7rem; } .gallery { grid-template-columns: 1fr; } .primary-image { height: 240px; } .thumbnail-strip img { height: 50px; } }
</style>
</head><body>Reduced sizing applied.</body></html>
